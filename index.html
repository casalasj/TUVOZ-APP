<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuVoz APP</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-share-nodes"></i> TuVoz APP
        </div>
        <div class="settings-btn">
            
            <button class="btn-toggle btn-sos" onclick="triggerSOS()" title="Enviar WhatsApp con GPS">
                <i class="fa-solid fa-truck-medical"></i> S.O.S
            </button>
            <button class="btn-toggle" onclick="toggleNoiseAlert()" id="btnNoise" title="Avisar de ruidos fuertes">
                <i class="fa-solid fa-ear-listen"></i> Alertas
            </button>

            <div class="gender-toggle">
                <button class="btn-gender active" onclick="setGender('A')" id="btnAmbos">
                    <i class="fa-solid fa-transgender"></i> Ambos
                </button>
                <button class="btn-gender" onclick="setGender('F')" id="btnMujer">
                    <i class="fa-solid fa-venus"></i> Soy Mujer
                </button>
                <button class="btn-gender" onclick="setGender('M')" id="btnHombre">
                    <i class="fa-solid fa-mars"></i> Soy Hombre
                </button>
            </div>

            <button class="btn-toggle" onclick="toggleDarkMode()" id="btnDark">
                <i class="fa-solid fa-moon"></i> Modo Oscuro
            </button>
            <button class="btn-toggle" onclick="toggleColorblindMode()" id="btnColorblind">
                <i class="fa-solid fa-eye"></i> Modo Daltónico
            </button>
        </div>
    </header>

    <div class="main-container">
        
        <div class="card">
            <div class="card-header">
                <div><i class="fa-solid fa-comment-dots"></i> Mi Respuesta</div>
            </div>
            
            <label for="voiceSelect"><i class="fa-solid fa-user-group"></i> Seleccionar Voz:</label>
            <select id="voiceSelect">
                <option value="7trLJS4KyQ6tdtU1l4Jp" data-gender="F">Belén - Voz Jóven</option>
                <option value="2xDPbeq94cgxB1q4x13I" data-gender="F">Marta - Voz Madura</option>
                <option value="ypTgPX1t0L8mYKB0nXeG" data-gender="M">César - Voz Jóven</option>
                <option value="0cheeVA5B3Cv6DGq65cT" data-gender="M">Alejandro - Voz Madura</option>
            </select>
            
            <div class="speed-control">
                <label for="speedSlider"><i class="fa-solid fa-gauge-high"></i> Velocidad:</label>
                <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.1" value="1">
            </div>

            <div id="suggestions" class="suggestions-row"></div>
            
            <textarea id="textToSpeak" placeholder="Escribe aquí... (Agita el celular para borrar)"></textarea>
            
            <div class="history-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <p class="history-title" style="margin-bottom: 0;"><i class="fa-solid fa-clock-rotate-left"></i> Frases recientes:</p>
                    <button class="btn-clear-history" onclick="clearHistory()" title="Borrar historial">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
                <div id="historyList" class="history-list"></div>
            </div>

            <div class="actions">
                <button class="btn btn-warning" onclick="playAlarm()" title="Llamar la atención">
                    <i class="fa-solid fa-bell"></i>
                </button>
                <button class="btn btn-secondary-icon" onclick="openLetrero()" title="Mostrar en pantalla completa">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <button class="btn btn-secondary-icon" onclick="openPizarra()" title="Dibujar en pizarra">
                    <i class="fa-solid fa-pen"></i>
                </button>
                
                <button class="btn btn-primary" onclick="speakText()">
                    <i class="fa-solid fa-volume-high"></i> HABLAR
                </button>
                <button class="btn btn-icon" onclick="clearText()" title="Borrar texto">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div><i class="fa-solid fa-ear-listen"></i> Escuchando</div>
                <div class="status-pill" id="listeningStatus">Inactivo</div>
            </div>
            
            <textarea id="recognizedText" placeholder="Lo que la otra persona diga aparecerá aquí..." readonly></textarea>
            
            <button class="btn btn-outline" onclick="copyToResponse()">
                <i class="fa-regular fa-copy"></i> Copiar a mi respuesta
            </button>

            <div class="actions">
                <button class="btn btn-cyan" onclick="startListening()">
                    <i class="fa-solid fa-microphone"></i> INICIAR
                </button>
                <button class="btn btn-pink" onclick="stopListening()">
                    <i class="fa-solid fa-stop"></i> PARAR
                </button>
                <button class="btn btn-icon" onclick="clearRecognizedText()" title="Borrar texto escuchado">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </div>

    </div>

    <div class="shortcuts-section">
        <div class="card-header" style="margin-bottom: 5px;">
            <div><i class="fa-solid fa-bolt"></i> Atajos Rápidos</div>
        </div>
        <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px; text-align: center;">(Mantén presionado un botón para añadirlo a Favoritos)</p>
        
        <div class="category-filters" id="categoryFilters"></div>
        <div class="shortcuts-grid" id="shortcutsGrid"></div>
    </div>

    <div id="letreroModal" class="modal">
        <span class="close-modal" onclick="closeLetrero()">&times;</span>
        <div id="letreroText"></div>
    </div>

    <div id="pizarraModal" class="modal">
        <span class="close-modal" onclick="closePizarra()">&times;</span>
        <div class="pizarra-header">
            <span style="color: white; font-weight: bold;">Pizarra de Dibujo</span>
            <button class="btn btn-icon" onclick="clearPizarra()"><i class="fa-solid fa-trash"></i></button>
        </div>
        <canvas id="pizarraCanvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
